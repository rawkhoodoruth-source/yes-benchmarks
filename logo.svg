<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
    </style>
    <mask id="kmask">
      <rect width="380" height="200" fill="white"/>
      <ellipse cx="57" cy="122" rx="8.5" ry="9.5" fill="black"/>
      <polygon points="50.5,129 63.5,129 60,154 54,154" fill="black"/>
    </mask>
  </defs>

  <!-- Yes in orange with keyhole mask on Y -->
  <text x="0" y="148"
    font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif"
    font-weight="900"
    font-size="158"
    fill="#e06030"
    mask="url(#kmask)">Yes</text>

  <!-- conciergerie -->
  <text x="190" y="190"
    font-family="'Nunito', Arial, sans-serif"
    font-weight="400"
    font-size="28"
    fill="#e06030"
    text-anchor="middle"
    letter-spacing="1.5">conciergerie</text>
</svg>
